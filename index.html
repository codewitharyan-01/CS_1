<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTU IoT & Applications – Question Bank</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e0e;
    --bg2: #151515;
    --card: #1a1a1a;
    --card-hover: #1f1f1f;
    --border: #2a2a2a;
    --fg: #e8e4df;
    --fg2: #9e9890;
    --accent: #d4a053;
    --accent-dim: rgba(212,160,83,0.12);
    --accent-glow: rgba(212,160,83,0.06);
    --green: #6ecf8e;
    --green-dim: rgba(110,207,142,0.1);
    --radius: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* Ambient glow blobs */
  .glow-tl, .glow-br {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(150px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-tl { top: -200px; left: -150px; background: var(--accent-glow); }
  .glow-br { bottom: -200px; right: -150px; background: var(--green-dim); }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.8s ease;
  }
  .header .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.2;
    color: var(--fg);
    margin-bottom: 12px;
  }
  .header p {
    color: var(--fg2);
    font-size: 15px;
    max-width: 520px;
    margin: 0 auto;
  }
  .header .meta {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 18px;
    font-size: 12px;
    color: var(--fg2);
  }
  .header .meta span i {
    color: var(--accent);
    margin-right: 5px;
  }

  /* Unit section */
  .unit {
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease both;
  }
  .unit:nth-child(2) { animation-delay: 0.1s; }

  .unit-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .unit-num {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .unit-header h2 {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 20px;
    color: var(--fg);
  }
  .unit-header .topics {
    font-size: 12px;
    color: var(--fg2);
    margin-top: 2px;
  }

  /* Marks group */
  .marks-group {
    margin-bottom: 24px;
  }
  .marks-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--fg2);
    margin-bottom: 12px;
    padding-left: 2px;
  }
  .marks-label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Q&A Card */
  .qa-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.3s, background 0.3s;
  }
  .qa-card:hover {
    border-color: #333;
  }
  .qa-card.open {
    border-color: rgba(212,160,83,0.25);
    background: var(--card-hover);
  }

  .qa-question {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .qa-question:hover {
    background: rgba(255,255,255,0.015);
  }
  .qa-question:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
    border-radius: var(--radius);
  }

  .q-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--fg2);
  }
  .q-meta .mark-badge {
    background: var(--accent-dim);
    color: var(--accent);
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: 500;
  }
  .q-meta .year-badge {
    color: var(--fg2);
    opacity: 0.7;
  }
  .q-text {
    font-size: 14.5px;
    font-weight: 400;
    color: var(--fg);
    line-height: 1.6;
  }

  .q-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: transparent;
    border: none;
    color: var(--fg2);
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 2px;
    transition: transform 0.3s, color 0.3s, background 0.3s;
    cursor: pointer;
  }
  .qa-card.open .q-toggle {
    transform: rotate(180deg);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .qa-answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .qa-card.open .qa-answer {
    max-height: 2000px;
  }
  .qa-answer-inner {
    padding: 0 18px 18px 18px;
    border-top: 1px solid var(--border);
    margin-top: 0;
    padding-top: 14px;
  }
  .qa-answer-inner p,
  .qa-answer-inner li {
    font-size: 13.5px;
    color: var(--fg2);
    line-height: 1.75;
  }
  .qa-answer-inner strong {
    color: var(--fg);
    font-weight: 500;
  }
  .qa-answer-inner ul, .qa-answer-inner ol {
    padding-left: 18px;
    margin: 6px 0;
  }
  .qa-answer-inner li {
    margin-bottom: 3px;
  }
  .qa-answer-inner .sub-heading {
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    margin: 12px 0 4px;
    display: block;
  }
  .qa-answer-inner code {
    background: rgba(255,255,255,0.06);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12.5px;
    color: var(--green);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
    animation: fadeUp 0.8s ease 0.05s both;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
  }
  .stat .num {
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
  }
  .stat .label {
    color: var(--fg2);
    font-size: 12px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease 0.08s both;
  }
  .ctrl-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg2);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
  .ctrl-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* Search */
  .search-wrap {
    position: relative;
    max-width: 400px;
    margin: 0 auto 28px;
    animation: fadeUp 0.8s ease 0.06s both;
  }
  .search-wrap i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--fg2);
    font-size: 13px;
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px 10px 38px;
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: var(--fg2); opacity: 0.5; }
  .search-wrap input:focus { border-color: var(--accent); }

  .no-results {
    text-align: center;
    color: var(--fg2);
    font-size: 14px;
    padding: 40px 0;
    display: none;
  }

  /* Scroll-to-top */
  .scroll-top {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg2);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .scroll-top.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .scroll-top:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 32px 0 0;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--fg2);
    opacity: 0.6;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 600px) {
    .container { padding: 36px 16px 80px; }
    .qa-question { padding: 14px 14px; gap: 10px; }
    .qa-answer-inner { padding: 0 14px 14px; }
    .stats-bar { gap: 8px; }
    .stat { padding: 8px 14px; }
    .header .meta { flex-direction: column; gap: 6px; }
  }
</style>
</head>

<script>
// ─── Question Bank Data ───
const data = [
  {
    unit: 1,
    unitTitle: "Introduction to Internet of Things",
    topics: "Application areas, Characteristics, Things in IoT, IoT Stack, Enabling Technologies, Challenges, Levels, CPS, WSN",
    groups: [
      {
        marks: 3,
        label: "Short Answer",
        questions: [
          {
            q: "Define IoT. Write the merits and demerits of IoT.",
            year: "W23",
            a: `<strong>IoT (Internet of Things)</strong> is a network of physical devices embedded with sensors, software, and connectivity that enables them to collect and exchange data over the internet without human-to-human or human-to-computer interaction.
            <span class="sub-heading">Merits</span>
            <ul>
              <li>Improved efficiency and automation of processes</li>
              <li>Data-driven decision making</li>
              <li>Cost savings through predictive maintenance</li>
              <li>Enhanced quality of life (smart homes, health)</li>
              <li>Real-time monitoring and control</li>
            </ul>
            <span class="sub-heading">Demerits</span>
            <ul>
              <li>Security vulnerabilities and cyberattacks</li>
              <li>Privacy concerns due to massive data collection</li>
              <li>High initial deployment cost</li>
              <li>Dependency on internet connectivity</li>
              <li>Complexity in integration of heterogeneous devices</li>
            </ul>`
          },
          {
            q: "What is IoT? List any five IoT applications.",
            year: "W24",
            a: `<strong>IoT</strong> refers to the interconnection of everyday physical objects via the internet, allowing them to send, receive, and act on data autonomously.
            <span class="sub-heading">Five Applications</span>
            <ol>
              <li><strong>Smart Home</strong> — Automated lighting, HVAC, security</li>
              <li><strong>Smart Healthcare</strong> — Remote patient monitoring, wearables</li>
              <li><strong>Smart Agriculture</strong> — Soil moisture sensing, precision farming</li>
              <li><strong>Industrial IoT (IIoT)</strong> — Predictive maintenance, quality control</li>
              <li><strong>Smart Cities</strong> — Traffic management, waste management, smart grids</li>
            </ol>`
          },
          {
            q: "Describe Internet of Things.",
            year: "S25",
            a: `<strong>Internet of Things</strong> is a paradigm where physical objects — ranging from everyday household items to sophisticated industrial tools — are connected to the internet, enabling them to communicate, share data, and make intelligent decisions. It integrates four key components: <strong>sensors</strong> (to perceive the environment), <strong>connectivity</strong> (to transmit data), <strong>processing</strong> (to analyze data), and <strong>user interface</strong> (to present insights and enable control). The goal of IoT is to create smart environments that reduce human intervention, improve efficiency, and enhance quality of life.`
          },
          {
            q: "List out enabling technologies in IoT. Explain any one in detail.",
            year: "S23",
            a: `<strong>Enabling Technologies:</strong> RFID, Wireless Sensor Networks (WSN), Cloud Computing, Big Data Analytics, Embedded Systems, Communication Protocols (MQTT, CoAP), Edge/Fog Computing, IPv6, NFC.
            <span class="sub-heading">RFID (Radio Frequency Identification)</span>
            RFID uses electromagnetic fields to automatically identify and track tags attached to objects. It consists of two components: a <strong>tag</strong> (with a microchip and antenna, either passive or active) and a <strong>reader</strong> (which emits radio waves and reads tag data). When a tag enters the reader's field, it transmits its stored data without line-of-sight. RFID is widely used in supply chain management, access control, inventory tracking, and toll collection (e.g., FASTag). It is a foundational technology for IoT because it provides low-cost, automatic object identification.`
          },
          {
            q: "Explain IoT and Cyber Physical System.",
            year: "S24",
            a: `A <strong>Cyber Physical System (CPS)</strong> is a system where physical and software components are deeply integrated, interacting with each other through feedback loops in real time. Examples include autonomous vehicles, smart grids, and medical monitoring systems.
            <br><br>
            <strong>Relationship with IoT:</strong> IoT is the connectivity layer that enables CPS. While <strong>IoT</strong> focuses on connecting things and collecting/exchanging data, <strong>CPS</strong> focuses on the tight interaction between computational elements and physical processes. In essence, IoT provides the infrastructure (sensors, networks, cloud) that CPS leverages to monitor and control physical processes. CPS adds the dimension of real-time control and safety-critical operation on top of IoT's data communication capabilities.`
          },
          {
            q: "Explain the role of 'things' in IoT.",
            year: "W25",
            a: `In IoT, <strong>'things'</strong> are the physical entities that form the foundation of the entire ecosystem. They are objects embedded with sensors, actuators, processing capability, and connectivity modules. Their roles include:
            <ul>
              <li><strong>Sensing</strong> — Detecting physical parameters (temperature, motion, light, etc.)</li>
              <li><strong>Data Collection</strong> — Gathering raw data from the environment continuously</li>
              <li><strong>Communication</strong> — Transmitting collected data to gateways, cloud, or other devices</li>
              <li><strong>Actuation</strong> — Performing physical actions based on received commands (turning on a motor, opening a valve)</li>
              <li><strong>Edge Processing</strong> — Some things perform preliminary data processing locally</li>
            </ul>
            Without things, there is no data to process, no environment to monitor, and no actions to execute — making them the most critical element of IoT.`
          },
          {
            q: "List enabling technologies for IoT.",
            year: "S25 OR",
            a: `<ul>
              <li><strong>RFID</strong> — Automatic object identification and tracking</li>
              <li><strong>Wireless Sensor Networks (WSN)</strong> — Distributed environmental sensing</li>
              <li><strong>Cloud Computing</strong> — Scalable storage and processing</li>
              <li><strong>Big Data Analytics</strong> — Extracting insights from large datasets</li>
              <li><strong>Embedded Systems</strong> — Dedicated computing within devices</li>
              <li><strong>IPv6</strong> — Expanded address space for billions of devices</li>
              <li><strong>Communication Protocols</strong> — MQTT, CoAP, HTTP, AMQP</li>
              <li><strong>Edge/Fog Computing</strong> — Processing data near the source</li>
              <li><strong>NFC</strong> — Short-range contactless communication</li>
              <li><strong>Low-Power Wide-Area Networks</strong> — LoRa, Sigfox, NB-IoT</li>
            </ul>`
          }
        ]
      },
      {
        marks: 4,
        label: "Medium Answer",
        questions: [
          {
            q: "Explain characteristics of the IoT.",
            year: "S23",
            a: `<ol>
              <li><strong>Connectivity</strong> — Devices must be networked to communicate (WiFi, BLE, Zigbee, LoRa)</li>
              <li><strong>Intelligence</strong> — Devices have processing capability for local decision-making</li>
              <li><strong>Scalability</strong> — System must handle growing numbers of devices seamlessly</li>
              <li><strong>Dynamic & Self-adapting</strong> — Devices adapt to changing contexts and environments</li>
              <li><strong>Self-configuring</strong> — Devices can automatically configure themselves when added to a network</li>
              <li><strong>Interoperability</strong> — Different devices, protocols, and platforms must work together</li>
              <li><strong>Security</strong> — End-to-end data and device security is essential</li>
              <li><strong>Sensing</strong> — Ability to perceive physical parameters through sensors</li>
              <li><strong>Heterogeneity</strong> — Supports diverse hardware, software, and network technologies</li>
            </ol>`
          },
          {
            q: "Explain the Characteristics of IoT.",
            year: "S24",
            a: `Same as above — the key characteristics of IoT include connectivity, intelligence, scalability, dynamic self-adaptation, self-configuration, interoperability, security, sensing ability, and heterogeneity. These characteristics distinguish IoT from traditional internet applications by enabling seamless interaction between the physical and digital worlds.`
          },
          {
            q: "Explain enabling technologies in IoT.",
            year: "W24",
            a: `<ul>
              <li><strong>RFID</strong> — Low-cost identification and tracking of physical objects using radio waves</li>
              <li><strong>WSN</strong> — Networks of spatially distributed sensors that monitor environmental conditions</li>
              <li><strong>Cloud Computing</strong> — Provides on-demand storage, computing power, and services for IoT data</li>
              <li><strong>Big Data Analytics</strong> — Processes massive volumes of IoT data to uncover patterns and insights</li>
              <li><strong>Embedded Systems</strong> — Dedicated computing systems built into devices for specific functions</li>
              <li><strong>Communication Protocols</strong> — MQTT (lightweight pub/sub), CoAP (RESTful for constrained devices), HTTP</li>
              <li><strong>Edge Computing</strong> — Processes data near the source to reduce latency and bandwidth usage</li>
              <li><strong>AI/ML</strong> — Enables predictive analytics, anomaly detection, and autonomous decision-making</li>
            </ul>`
          },
          {
            q: "Explain the significance of AI/ML in IoT.",
            year: "W25",
            a: `AI and ML transform IoT from simple data collection to <strong>intelligent decision-making</strong>:
            <ul>
              <li><strong>Predictive Maintenance</strong> — ML models analyze sensor data to predict equipment failures before they occur, reducing downtime</li>
              <li><strong>Anomaly Detection</strong> — AI identifies unusual patterns in data streams, enabling real-time security threat detection</li>
              <li><strong>Data Analytics</strong> — ML extracts meaningful insights from large, complex IoT datasets that manual analysis cannot handle</li>

              <li><strong>Network/Connectivity Layer</strong> — Responsible for transmitting data from the perception layer to processing systems. Uses technologies like WiFi, Bluetooth, Zigbee, LoRa, 4G/5G, and protocols like MQTT, CoAP, HTTP.</li>

          {
            q: "Explain the key features of the ARM Cortex-M architecture that make it suitable for IoT.",

            a: `<ol>
              <li><strong>Thumb-2 Instruction Set</strong> — Combines 16-bit and 32-bit instructions in a single set, providing both high code density (less flash memory) and high performance — critical for cost-sensitive IoT devices</li>
              <li><strong>Low Power Design</strong> — Multiple sleep modes (Sleep, Deep Sleep, Deep Sleep with retention), low-power peripherals with independent clock gating, Wake-up Interrupt Controller (WIC) that allows the CPU to wake from deep sleep without clock restoration delay</li>
              <li><strong>NVIC (Nested Vectored Interrupt Controller)</strong> — Supports up to 240 interrupts with deterministic, prioritized handling. Critical for real-time IoT applications where sensor data must be processed within strict deadlines</li>

          {
            q: "Define: (i) Accuracy (ii) Precision (iii) Drift (iv) Resolution as properties of sensors.",

            a: `<ol>
              <li><strong>Accuracy</strong> — How close the sensor's measured value is to the true/actual value. It indicates the correctness of measurement.
              <br>Example: If the actual temperature is 25.0°C and the sensor reads 25.2°C, the accuracy is ±0.2°C. Accuracy is affected by calibration, manufacturing tolerances, and environmental conditions.</li>

              <li><strong>Precision</strong> — The consistency or repeatability of measurements when the same input is measured multiple times under the same conditions. A precise sensor gives very similar readings each time, even if those readings are not close to the true value.
              <br>Example: A sensor reading 24.8, 24.9, 24.8, 24.9°C for a true 25.0°C is precise but not accurate. Precision depends on noise, resolution, and mechanical stability.</li>

              <li><strong>Drift</strong> — The gradual, unintended change in a sensor's output over time when the input remains constant. It degrades measurement quality over the sensor's lifetime.
              <br>Types: <strong>Zero drift</strong> (output shifts at zero input) and <strong>Sensitivity drift</strong> (slope of input-output curve changes). Caused by component aging, temperature cycling, humidity, and mechanical stress.</li>

              <li><strong>Resolution</strong> — The smallest detectable change in the input that the sensor can reliably measure and output. It defines the granularity of measurement.
              <br>Example: A 12-bit ADC with 5V reference has resolution of 5V/4096 = 1.22mV — it cannot detect changes smaller than 1.22mV. Higher resolution means finer measurement detail.</li>

            q: "What is ARM? Explain special features of ARM processor.",

            <span class="sub-heading">Special Features</span>
            <ol>
              <li><strong>RISC Architecture</strong> — Simple, fixed-length instructions (32-bit), single-cycle execution for most instructions, large register file reduces memory access</li>
              <li><strong>Thumb Instruction Set</strong> — 16-bit compressed subset of ARM instructions, achieves ~65% code density with ~90% performance of 32-bit ARM mode</li>
              <li><strong>Barrel Shifter</strong> — Integrated shifter that performs shift/rotate operations within the same instruction cycle as the ALU operation, eliminating extra cycles</li>
              <li><strong>Multiply-Accumulate (MAC)</strong> — Single-cycle hardware multiply and multiply-accumulate operations, essential for DSP and filter algorithms</li>
              <li><strong>Conditional Execution</strong> — Every instruction can be conditionally executed based on APSR flags (EQ, NE, GT, LT, etc.), reducing branch instructions and pipeline stalls</li>
              <li><strong>Load/Store Architecture</strong> — Data processing operates only on registers; only load/store instructions access memory, simplifying pipeline design</li>
              <li><strong>Register Bank</strong> — 16 general-purpose registers (R0-R15), with R13 (SP), R14 (LR), R15 (PC) having special roles; Fast interrupt mode has shadow registers for zero-latency context switching</li>

            </ol>`

          {
            q: "Explain CSPR in ARM.",
            year: "S24",
            a: `The <strong>CPSR (Current Program Status Register)</strong> is a 32-bit register in ARM that stores condition code flags and control bits. It is crucial for conditional execution and mode management.
            <span class="sub-heading">Flag Bits (Condition Flags)</span>
            <ul>
              <li><strong>N (Bit 31) — Negative</strong>: Set to 1 if the result of an ALU operation is negative (bit 31 of result is 1)</li>
              <li><strong>Z (Bit 30) — Zero</strong>: Set to 1 if the ALU result is zero</li>
              <li><strong>C (Bit 29) — Carry</strong>: Set to 1 if a carry-out occurs from the ALU (in addition) or a borrow does not occur (in subtraction)</li>
              <li><strong>V (Bit 28) — Overflow</strong>: Set to 1 if signed overflow occurs (result exceeds signed range)</li>

            <span class="sub-heading">Control Bits</span>
            <ul>
              <li><strong>T (Bit 5) — Thumb State</strong>: 1 = Thumb mode, 0 = ARM mode</li>
              <li><strong>I (Bit 7) — IRQ Disable</strong>: When 1, IRQ interrupts are disabled</li>
              <li><strong>F (Bit 6) — FIQ Disable</strong>: When 1, Fast Interrupt requests are disabled</li>
              <li><strong>M[4:0] (Bits 0-4) — Mode Bits</strong>: Select processor mode:
                <ul>
                  <li>10000 — User mode (unprivileged)</li>
                  <li>10001 — FIQ mode (Fast Interrupt)</li>
                  <li>10010 — IRQ mode (Interrupt)</li>
                  <li>10011 — Supervisor mode (SVC, after reset)</li>
                  <li>10111 — Abort mode</li>
                  <li>11011 — Undefined mode</li>
                  <li>11111 — System mode (privileged, uses User registers)</li>
                </ul>
              </li>
            </ul>`

            q: "Explain pinMode(), digitalRead() and digitalWrite() functions of Arduino.",

            a: `<span class="sub-heading">pinMode(pin, mode)</span>
            Configures a GPIO pin as INPUT, OUTPUT, or INPUT_PULLUP. Must be called in <code>setup()</code> before using the pin.
            <br><strong>Parameters:</strong> <code>pin</code> — pin number (0-13 on Uno), <code>mode</code> — INPUT, OUTPUT, or INPUT_PULLUP
            <br><strong>Example:</strong> <code>pinMode(13, OUTPUT);</code> — Sets pin 13 as output
            <br><strong>Internal behavior:</strong> Configures the corresponding DDRx (Data Direction Register) bits and PORTx register for pull-up.

            <span class="sub-heading">digitalRead(pin)</span>
            Reads the digital value (HIGH or LOW) from a pin configured as INPUT.
            <br><strong>Returns:</strong> HIGH (1, ~5V) or LOW (0, ~0V)

            <br><strong>Internal behavior:</strong> Reads the PINx register bit corresponding to the pin.

            <span class="sub-heading">digitalWrite(pin, value)</span>
            Writes a HIGH or LOW value to a pin configured as OUTPUT.

            <br><strong>Example:</strong> <code>digitalWrite(13, HIGH);</code> — Sets pin 13 to 5V (turns on built-in LED)

            <span class="sub-heading">Core Registers</span>
            <ul>
              <li><strong>Accumulator (A, 8-bit)</strong> — The most important register; used for all arithmetic and logical operations (ADD, SUB, AND, OR, etc.). One operand is always in A.</li>
              <li><strong>B Register (8-bit)</strong> — Used with A for MUL (multiply A×B, result in A:B) and DIV (divide A by B, quotient in A, remainder in B). Otherwise usable as general-purpose register.</li>
              <li><strong>Program Counter (PC, 16-bit)</strong> — Points to the address of the next instruction to be fetched from program memory. Automatically incremented after each fetch.</li>
              <li><strong>Data Pointer (DPTR, 16-bit)</strong> — Used for accessing external ROM/RAM. Composed of DPH (high byte) and DPL (low byte). Used with MOVC and MOVX instructions.</li>
              <li><strong>Stack Pointer (SP, 8-bit)</strong> — Points to the top of the stack in internal RAM (locations 08H-1FH by default). Pre-incremented before PUSH, post-decremented after POP.</li>
            </ul>
            <span class="sub-heading">Status Register</span>
            <ul>
              <li><strong>PSW (Program Status Word, 8-bit)</strong> — Stores flags and register bank selection:

// ─── Render Logic ───
const container = document.getElementById('qaContainer');
const searchInput = document.getElementById('searchInput');
const noResults = document.getElementById('noResults');
let allCards = [];

function renderAll() {
  container.innerHTML = '';
  allCards = [];

  data.forEach(unit => {
    const section = document.createElement('section');
    section.className = 'unit';
    section.dataset.unit = unit.unit;

    // Unit header
    section.innerHTML = `
      <div class="unit-header">
        <div class="unit-num">${unit.unit}</div>
        <div>
          <h2>${unit.unitTitle}</h2>
          <div class="topics">${unit.topics}</div>
        </div>
      </div>
    `;

    unit.groups.forEach(group => {
      const groupDiv = document.createElement('div');
      groupDiv.className = 'marks-group';
      groupDiv.dataset.marks = group.marks;

      groupDiv.innerHTML = `<div class="marks-label"><span class="dot"></span>${group.marks} Marks — ${group.label}</div>`;

      group.questions.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'qa-card';
        card.dataset.marks = group.marks;
        card.dataset.searchText = (item.q + ' ' + item.a).toLowerCase().replace(/<[^>]*>/g, '');

        card.innerHTML = `
          <div class="qa-question" role="button" tabindex="0" aria-expanded="false">
            <div class="q-info">
              <div class="q-meta">
                <span class="mark-badge">${group.marks}M</span>
                <span class="year-badge">${item.year}</span>
              </div>
              <div class="q-text">${item.q}</div>
            </div>
            <button class="q-toggle" aria-label="Toggle answer"><i class="fas fa-chevron-down"></i></button>
          </div>
          <div class="qa-answer">
            <div class="qa-answer-inner">${item.a}</div>
          </div>
        `;

        // Toggle
        const btn = card.querySelector('.qa-question');
        btn.addEventListener('click', () => toggleCard(card));
        btn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleCard(card); } });

        groupDiv.appendChild(card);
        allCards.push(card);
      });

      section.appendChild(groupDiv);
    });

    container.appendChild(section);
  });
}

function toggleCard(card) {
  const isOpen = card.classList.contains('open');
  card.classList.toggle('open');
  card.querySelector('.qa-question').setAttribute('aria-expanded', !isOpen);
}

function expandAll() {
  allCards.forEach(c => {
    c.classList.add('open');
    c.querySelector('.qa-question').setAttribute('aria-expanded', 'true');
  });
}

function collapseAll() {
  allCards.forEach(c => {
    c.classList.remove('open');
    c.querySelector('.qa-question').setAttribute('aria-expanded', 'false');
  });
}

function filterMarks(m) {
  allCards.forEach(c => {
    if (m === 0) {
      c.style.display = '';
    } else {
      c.style.display = parseInt(c.dataset.marks) === m ? '' : 'none';
    }
  });
  // Hide empty groups
  document.querySelectorAll('.marks-group').forEach(g => {
    const visibleCards = g.querySelectorAll('.qa-card:not([style*="display: none"])');
    g.style.display = visibleCards.length ? '' : 'none';
  });
  // Hide empty units
  document.querySelectorAll('.unit').forEach(u => {
    const visibleGroups = u.querySelectorAll('.marks-group:not([style*="display: none"])');
    u.style.display = visibleGroups.length ? '' : 'none';
  });
}

// Search
searchInput.addEventListener('input', () => {
  const query = searchInput.value.toLowerCase().trim();
  let anyVisible = false;

  allCards.forEach(c => {
    if (!query) {
      c.style.display = '';
      anyVisible = true;
    } else {
      const match = c.dataset.searchText.includes(query);
      c.style.display = match ? '' : 'none';
      if (match) anyVisible = true;
    }
  });

  noResults.style.display = anyVisible ? 'none' : 'block';

  // Auto-expand matching cards on search
  if (query) {
    allCards.forEach(c => {
      if (c.style.display !== 'none') {
        c.classList.add('open');
        c.querySelector('.qa-question').setAttribute('aria-expanded', 'true');
      }
    });
  }

  // Hide empty groups/units
  document.querySelectorAll('.marks-group').forEach(g => {
    const visibleCards = g.querySelectorAll('.qa-card:not([style*="display: none"])');
    g.style.display = visibleCards.length ? '' : 'none';
  });
  document.querySelectorAll('.unit').forEach(u => {
    const visibleGroups = u.querySelectorAll('.marks-group:not([style*="display: none"])');
    u.style.display = visibleGroups.length ? '' : 'none';
  });
});

// Scroll-to-top button
const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

// Init
renderAll();
</script>
